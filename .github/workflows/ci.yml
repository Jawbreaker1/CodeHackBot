name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild-root:
    name: Rebuild Root
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Deterministic CI
        env:
          GUARDRAIL_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ./scripts/ci.sh
